services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      # CORREÇÃO: Bind mount para sincronizar o código do host com o container
      - ..:/workspace:cached
      # SHADOW VOLUME: O node_modules fica isolado no Linux para suportar symlinks (EINVAL FIX)
      - project-node-modules:/workspace/node_modules
    # Mantém o container vivo para o VS Code se conectar
    command: /bin/sh -c "while sleep 1000; do :; done"
    networks:
      - financial-net
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password@db:5432/financial_intelligence
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: financial_intelligence
    networks:
      - financial-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

networks:
  financial-net:
    driver: bridge

volumes:
  postgres-data:
  project-node-modules:
